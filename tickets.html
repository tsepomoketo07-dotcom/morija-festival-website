<!DOCTYPE html>
<html>

<head>

<title>Tickets</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:Arial;
background:#f4f4f4;
margin:0;
}

/* HEADER */
header{
background:#004d00;
color:white;
text-align:center;
padding:25px;
}

/* NAV */
nav{
background:#222;
text-align:center;
padding:12px;
}

nav a{
color:white;
margin:0 15px;
text-decoration:none;
font-weight:bold;
}

nav a:hover{
color:gold;
}

/* CONTAINER */
.container{
background:white;
max-width:900px;
margin:20px auto;
padding:20px;
border-radius:8px;
}

/* TABLE */
table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}

th, td{
border:1px solid #ddd;
padding:10px;
text-align:center;
}

th{
background:#004d00;
color:white;
}

/* FORM */
form{
margin-top:20px;
}

input, select{
width:100%;
padding:10px;
margin:10px 0;
border:1px solid #ccc;
border-radius:5px;
}

button{
background:#004d00;
color:white;
padding:10px;
border:none;
width:100%;
font-size:16px;
cursor:pointer;
}

button:hover{
background:green;
}

/* FOOTER */
footer{
background:#222;
color:white;
text-align:center;
padding:15px;
margin-top:20px;
}

</style>

</head>

<body>

<header>
<h1>Tickets & Registration</h1>
<p>Book your spot at the festival</p>
</header>

<nav>
<a href="index.html">Home</a>
<a href="about.html">About</a>
<a href="programme.html">Programme</a>
<a href="tickets.html">Tickets</a>
<a href="contact.html">Contact</a>
</nav>

<div class="container">

<h2>Ticket Prices</h2>

<table>

<tr>
<th>Ticket Type</th>
<th>Price</th>
</tr>

<tr>
<td>Adults</td>
<td>M100</td>
</tr>

<tr>
<td>Students</td>
<td>M50</td>
</tr>

<tr>
<td>Children</td>
<td>Free</td>
</tr>

</table>


<h2>Register Now</h2>

<form>

<label>Full Name</label>
<input type="text" placeholder="Enter your name" required>

<label>Email</label>
<input type="email" placeholder="Enter your email" required>

<label>Phone</label>
<input type="text" placeholder="Enter phone number">

<label>Number of Tickets</label>
<select>
<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>
</select>

<button type="submit">Submit Booking</button>

</form>

</div>

<footer>
<p>© 2026 Morija Arts Festival</p>
</footer>

</body>
</html>
